; Godot 4 Export Presets — DOWN
; Place this file at res://export_presets.cfg
; Configure paths to match your local Godot 4 export templates.

; ── Windows Desktop ───────────────────────────────────────────────────────────
[preset.0]
name="Windows Desktop"
platform="Windows Desktop"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter="*.md,*.txt,*.psd,*.aseprite"
export_path="builds/windows/DOWN.exe"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false

[preset.0.options]
; -- Application --
application/icon="res://Assets/icon.png"
application/file_version="1.0.0.0"
application/product_version="1.0.0.0"
application/company_name="YourStudio"
application/product_name="DOWN"
application/file_description="DOWN — Tactical Isometric Action RPG"
application/copyright="Copyright © 2025 YourStudio"

; -- Binary --
binary_format/architecture="x86_64"
binary_format/embed_pck=true

; -- Texture --
texture_format/s3tc=true
texture_format/etc=false
texture_format/etc2=false

; -- Pixel art: disable mipmap generation --
visual_server/use_nearest_mipmap_filter=true

; ── Web (HTML5 / WebGL) ───────────────────────────────────────────────────────
[preset.1]
name="Web"
platform="Web"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter="*.md,*.txt,*.psd,*.aseprite"
export_path="builds/web/index.html"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false

[preset.1.options]
; -- Application --
html/export_icon=true
html/custom_html_shell=""
html/head_include=""
html/canvas_resize_policy=2         ; "Fit to screen" — best for pixel art
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false

; -- Threading --
; WARNING: SharedArrayBuffer requires HTTPS + COOP/COEP headers on your server.
; Set to false for simple itch.io / GitHub Pages deploys, true for custom servers.
html/use_threads=false

; -- Memory --
; Godot 4 Web export uses Wasm — set initial memory generously for the engine.
; 256 MB is a safe starting point for a small action RPG.
html/initial_memory_mb=256

; -- Texture --
; WebGL 2 supports S3TC via WEBGL_compressed_texture_s3tc — enable both.
texture_format/s3tc=true
texture_format/etc=false
texture_format/etc2=true            ; Fallback for mobile WebGL

; -- Pixel art quality --
rendering/quality/filters/msaa=0   ; Disable MSAA — pixel art looks better without it
rendering/quality/filters/use_nearest_mipmap_filter=true
